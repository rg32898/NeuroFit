kind = "web"
previewPath = "/admin/"
title = "NeuroFit Admin"
version = "1.0.0"
id = "artifacts/admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin" ]
localPort = 23744

[services.development]
run = "pnpm --filter @workspace/admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/admin", "run", "start" ]

[services.env]
PORT = "23744"
